name: CI

on:
  push:
    branches: ["dev", "feature/**", "fix/**", "hotfix/**"]
    tags-ignore: ["**"]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & pre-commit
    runs-on: [self-hosted, Linux, X64, lbl-gioia]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Test (Python 3.12)
    runs-on: [self-hosted, Linux, X64, lbl-gioia]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies with uv
        run: |
          # Utilizziamo il percorso assoluto dell'utente prg-costantino
          # Questo evita i conflitti con la cartella /root durante l'esecuzione del servizio
          /home/prg-costantino/.local/bin/uv pip install --system -r requirements.txt

      - name: Run pytest
        run: pytest --cov=custom_components --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        env:
          HOME: /home/prg-costantino
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  hacs:
    name: HACS validation
    runs-on: [self-hosted, Linux, X64, lbl-gioia]
    steps:
      - uses: actions/checkout@v6
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Home Assistant hassfest
    runs-on: [self-hosted, Linux, X64, lbl-gioia]
    steps:
      - uses: actions/checkout@v6
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
